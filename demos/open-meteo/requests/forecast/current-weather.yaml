uid: 4K8J1Z7L
id: forecast.current-weather
name: Current Weather
tags:
  - forecast
method: GET
url: "{{base_url}}/forecast"
query:
  latitude: "40.4168"
  longitude: "-3.7038"
  current: temperature_2m,relative_humidity_2m,apparent_temperature,precipitation,weather_code,wind_speed_10m,wind_direction_10m
  timezone: Europe/Madrid
cases:
  london:
    latitude: "51.5074"
    longitude: "-0.1278"
  new-york:
    latitude: "40.7128"
    longitude: "-74.0060"
expect:
  status: 200
  time_ms: "< 3000"
  json:
    current.temperature_2m: exists
    current.weather_code: exists
notes: >
  Fetches real-time conditions for a location. Default coordinates are Madrid.
  Switch to the london or new-york case, or override latitude/longitude directly.
  Add variables to the `current` param (e.g. cloud_cover, wind_gusts_10m).
