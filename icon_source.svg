  <g fill="none" stroke="white" stroke-linecap="round">
    <path d="M 456.0,230.0 A 56,56 0 0 1 568.0,230.0" stroke-width="30"/>
    <path d="M 416.0,230.0 A 96,96 0 0 1 608.0,230.0" stroke-width="30"/>
